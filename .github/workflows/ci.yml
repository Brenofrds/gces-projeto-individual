name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-build-lint:
    name: Backend build e lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar lint do backend
        run: npm run lint

      - name: Rodar build/check do backend
        run: npm run build

      - name: Rodar testes do backend
        run: npm test

      - name: Rodar testes de fuzzing do backend
        run: npm run test:fuzz

  security:
    name: Auditoria de seguranca (SCA)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Auditoria de dependencias (SCA)
        run: npm audit --audit-level=high

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: [backend-build-lint]

    defaults:
      run:
        working-directory: server

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar cobertura de testes
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
