apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mkjs-ingress
  namespace: mkjs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - mkjs.example.com
      secretName: mkjs-tls
  rules:
    - host: mkjs.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
